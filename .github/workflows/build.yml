name: Build FrontCamAsBack

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Install ldid
        run: brew install ldid

      - name: Setup Theos
        run: |
          export THEOS=~/theos
          git clone --recursive https://github.com/theos/theos.git $THEOS
          cd $THEOS/sdks
          curl -LO https://github.com/theos/sdks/archive/master.tar.gz
          tar -xzf master.tar.gz --strip-components=1
          rm master.tar.gz

      - name: Build
        run: |
          export THEOS=~/theos
          export PATH=$THEOS/bin:$PATH
          make clean
          make package FINALPACKAGE=1

      - name: Create rootless deb
        run: |
          mkdir -p layout/var/jb/Library/MobileSubstrate/DynamicLibraries
          cp .theos/obj/FrontCamAsBack.dylib layout/var/jb/Library/MobileSubstrate/DynamicLibraries/
          cp FrontCamAsBack.plist layout/var/jb/Library/MobileSubstrate/DynamicLibraries/
          mkdir -p layout/DEBIAN
          echo "Package: com.frontcamasback" > layout/DEBIAN/control
          echo "Name: FrontCamAsBack" >> layout/DEBIAN/control
          echo "Depends: mobilesubstrate (>= 0.9.5000)" >> layout/DEBIAN/control
          echo "Version: 1.0.0" >> layout/DEBIAN/control
          echo "Architecture: iphoneos-arm64e" >> layout/DEBIAN/control
          echo "Description: Replaces broken rear camera with front camera video stream." >> layout/DEBIAN/control
          echo "Maintainer: Dev" >> layout/DEBIAN/control
          echo "Author: Dev" >> layout/DEBIAN/control
          echo "Section: Tweaks" >> layout/DEBIAN/control
          dpkg-deb -Znone -b layout FrontCamAsBack_rootless.deb

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: FrontCamAsBack
          path: FrontCamAsBack_rootless.deb
